# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Main Server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${NGINX_SERVER_NAME:-iga.example.com};

    # ─── TLS Certificates ─────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ─── HSTS ─────────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: ws:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Request-ID $request_id always;

    # ─── Connection Limits ────────────────────────────────────────────────────
    limit_conn conn_limit 100;

    # ─── Request Size Limit ───────────────────────────────────────────────────
    client_max_body_size 50m;

    # ─── Health Check (local endpoint, no backend proxy) ──────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    location = /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.28.0.0/16;
        deny all;
    }

    # ─── Auth / Login — strict rate limiting ──────────────────────────────────
    location = /api/v1/auth/login {
        limit_req zone=api_login burst=5 nodelay;
        limit_req_log_level warn;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID,X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://iga_backend;
        include /etc/nginx/proxy_params;
    }

    # ─── SCIM Endpoint ────────────────────────────────────────────────────────
    location /scim/ {
        limit_req zone=api_scim burst=10 nodelay;

        # CORS headers for SCIM
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Tenant-ID' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }

        proxy_pass http://iga_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    # ─── GraphQL Endpoint ─────────────────────────────────────────────────────
    location /graphql {
        limit_req zone=api_general burst=20 nodelay;

        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Authorization,X-Tenant-ID' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass http://iga_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 60s;
    }

    # ─── WebSocket Upgrade ────────────────────────────────────────────────────
    location /ws/ {
        limit_req zone=ws_connect burst=5 nodelay;

        proxy_pass http://iga_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ─── General API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;

        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID,X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # CORS headers on actual responses
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition,X-Request-ID,X-Total-Count' always;

        proxy_pass http://iga_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ─── Metrics endpoint (internal only) ─────────────────────────────────────
    location /metrics {
        allow 127.0.0.1;
        allow 172.28.0.0/16;
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://iga_backend;
        include /etc/nginx/proxy_params;
    }

    # ─── OpenAPI Docs (dev/staging only; block in prod if needed) ─────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://iga_backend;
        include /etc/nginx/proxy_params;
    }

    # ─── Static assets with cache headers ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass http://iga_frontend;
        include /etc/nginx/proxy_params;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── SPA Catch-All (React Router) ─────────────────────────────────────────
    location / {
        proxy_pass http://iga_frontend;
        include /etc/nginx/proxy_params;
        proxy_intercept_errors on;
        error_page 404 = @spa_fallback;
    }

    location @spa_fallback {
        proxy_pass http://iga_frontend/index.html;
        include /etc/nginx/proxy_params;
    }
}
