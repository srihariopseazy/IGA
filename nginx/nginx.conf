user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ─── Basic Settings ───────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    charset utf-8;
    charset_types text/plain text/xml text/css text/javascript application/javascript application/json;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    reset_timedout_connection on;

    server_tokens off;
    more_clear_headers Server;

    # ─── Buffer / Timeout Settings ────────────────────────────────────────────
    client_body_buffer_size       16k;
    client_header_buffer_size     4k;
    client_max_body_size          50m;
    large_client_header_buffers   4 16k;
    client_body_timeout           30s;
    client_header_timeout         15s;
    send_timeout                  30s;

    # ─── Proxy Settings ───────────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        X-Request-ID      $request_id;
    proxy_buffering         on;
    proxy_buffer_size       8k;
    proxy_buffers           8 64k;
    proxy_busy_buffers_size 128k;
    proxy_connect_timeout   10s;
    proxy_read_timeout      120s;
    proxy_send_timeout      120s;
    proxy_cache_bypass      $http_upgrade;

    # ─── Log Format ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'rid=$request_id';

    log_format json_combined escape=json
        '{'
            '"time_local":"$time_local",'
            '"remote_addr":"$remote_addr",'
            '"remote_user":"$remote_user",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     5;
    gzip_min_length     1024;
    gzip_buffers        16 8k;
    gzip_http_version   1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        font/opentype;

    # ─── SSL / TLS Settings ───────────────────────────────────────────────────
    ssl_protocols               TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers   on;
    ssl_ciphers                 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache           shared:SSL:50m;
    ssl_session_timeout         1d;
    ssl_session_tickets         off;
    ssl_stapling                on;
    ssl_stapling_verify         on;
    resolver                    8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout            5s;
    ssl_dhparam                 /etc/nginx/certs/dhparam.pem;
    ssl_ecdh_curve              secp384r1;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    # General API rate limit (by IP): 60 requests/minute
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;

    # Login endpoint rate limit (by IP): 10 requests/minute
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=10r/m;

    # SCIM endpoint rate limit (by IP): 30 requests/minute
    limit_req_zone $binary_remote_addr zone=api_scim:10m rate=30r/m;

    # WebSocket connections (by IP)
    limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/m;

    # Overall connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn_status 429;
    limit_req_status 429;

    # ─── Upstream Definitions ─────────────────────────────────────────────────
    upstream iga_backend {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s weight=1;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    upstream iga_frontend {
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ─── Security Headers Map ─────────────────────────────────────────────────
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   max;
        application/javascript     max;
        ~image/                    30d;
        ~font/                     30d;
    }

    # ─── Real IP from trusted proxies ─────────────────────────────────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ─── Include virtual host configs ─────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
