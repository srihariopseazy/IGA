apiVersion: v1
kind: Service
metadata:
  name: iga-backend
  namespace: iga
  labels:
    app.kubernetes.io/name: iga-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: iga-platform
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: iga-backend
    app.kubernetes.io/component: backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
  sessionAffinity: None
