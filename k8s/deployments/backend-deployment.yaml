apiVersion: apps/v1
kind: Deployment
metadata:
  name: iga-backend
  namespace: iga
  labels:
    app: iga-backend
    component: api
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: iga-backend
  template:
    metadata:
      labels:
        app: iga-backend
        component: api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        checksum/config: "{{ include (print $.Template.BasePath \"/configmaps/backend-config.yaml\") . | sha256sum }}"
    spec:
      serviceAccountName: iga-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          image: iga-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: redis-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: rabbitmq-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: secret-key
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: jwt-secret-key
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: encryption-key
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: minio-access-key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: minio-secret-key
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: smtp-password
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: APP_NAME
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: ENVIRONMENT
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: DEBUG
            - name: API_V1_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: API_V1_PREFIX
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: CORS_ORIGINS
            - name: DATABASE_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: DATABASE_POOL_SIZE
            - name: DATABASE_MAX_OVERFLOW
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: DATABASE_MAX_OVERFLOW
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: MINIO_ENDPOINT
            - name: ELASTICSEARCH_URL
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: ELASTICSEARCH_URL
            - name: RATE_LIMIT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iga-backend-config
                  key: RATE_LIMIT_ENABLED
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: celery-broker-url
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: iga-secrets
                  key: celery-result-backend
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-tmp
              mountPath: /app/tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - iga-backend
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: iga-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iga-backend-hpa
  namespace: iga
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iga-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
