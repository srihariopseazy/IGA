# ============================================================
# Alembic Configuration for IGA Platform
# ============================================================

[alembic]
# Path to migration scripts
script_location = migrations

# Naming template for new revision files
# Format: YYYYMMDD_HHMMSS_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Prepend sys.path so that backend imports resolve correctly
prepend_sys_path = .

# Timezone for generated migration timestamps
timezone = UTC

# Maximum length of the slug portion of the revision file name
truncate_slug_length = 40

# Version locations — supports multiple directories
# version_locations = %(here)s/migrations/versions

# sys.path entries at migration time
# path_separator = os  # Use OS path separator

# Output encoding for migration scripts
output_encoding = utf-8

# Compare column types during autogenerate
compare_type = true

# Compare server defaults during autogenerate
compare_server_default = true

# Include schemas in autogenerate comparison
include_schemas = false

# ─── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
